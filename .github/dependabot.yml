version: 2
updates:
  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
    groups:
      all:
        patterns: ["*"]

  - package-ecosystem: npm
    directory: /worker
    schedule:
      interval: weekly
    groups:
      all:
        patterns: ["*"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      all:
        patterns: ["*"]
