name: CI

"on":
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0
        with:
          version: latest

      - name: Set up Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: |
            frontend/pnpm-lock.yaml
            worker/pnpm-lock.yaml

      - name: Install frontend dependencies
        run: |
          set -euo pipefail
          cd frontend && pnpm install --frozen-lockfile

      - name: Prettier check
        run: |
          set -euo pipefail
          cd frontend && pnpm exec prettier --check .

      - name: ESLint
        run: |
          set -euo pipefail
          cd frontend && pnpm exec eslint .

  typecheck:
    name: Type check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0
        with:
          version: latest

      - name: Set up Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: |
            frontend/pnpm-lock.yaml
            worker/pnpm-lock.yaml

      - name: Install frontend dependencies
        run: |
          set -euo pipefail
          cd frontend && pnpm install --frozen-lockfile

      - name: Install worker dependencies
        run: |
          set -euo pipefail
          cd worker && pnpm install --frozen-lockfile

      - name: svelte-check
        run: |
          set -euo pipefail
          cd frontend && pnpm exec svelte-check --tsconfig ./tsconfig.app.json

      - name: Worker typecheck
        run: |
          set -euo pipefail
          cd worker && pnpm exec tsc --noEmit

  build:
    name: Build
    needs: [lint, typecheck]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0
        with:
          version: latest

      - name: Set up Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: |
            frontend/pnpm-lock.yaml
            worker/pnpm-lock.yaml

      - name: Install frontend dependencies
        run: |
          set -euo pipefail
          cd frontend && pnpm install --frozen-lockfile

      - name: Build frontend
        run: |
          set -euo pipefail
          cd frontend && pnpm build

      - name: Upload build artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3.0.1
        with:
          path: frontend/dist

  deploy:
    name: Deploy to GitHub Pages
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [build]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
